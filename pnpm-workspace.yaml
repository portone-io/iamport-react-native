packages:
  - .
  - example
  - exampleForWebView
  - packages/iamport-react-native
allowBuilds:
  unrs-resolver: true

# 전이 의존성을 레지스트리 외부(git/tarball URL)에서 가져오는 것 차단
blockExoticSubdeps: true

catalog:
  "@changesets/cli": ^2.31.0
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  react: ~19.2.5
  react-dom: ~19.2.5
  react-native: ~0.83.6
  typescript: ^6.0.3

# package.json 의 engines 필드 강제
engineStrict: true

# 게시 후 3일이 지난 버전만 설치 (분 단위)
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - iamport-react-native

overrides:
  "eslint-config-prettier@<=10.1.7": ^10.1.8
  ua-parser-js: ^1.0.41
  "@babel/eslint-parser@<8.0.0": ^8.0.0-rc.3

strictDepBuilds: true

# 업데이트 시 신뢰 등급 하락(provenance 제거 등) 차단
trustPolicy: no-downgrade
trustPolicyExclude:
  - tailwindcss@3.4.18
  - react-native-worklets@0.8.1
  - ua-parser-js@1.0.41
trustPolicyIgnoreAfter: 525960
